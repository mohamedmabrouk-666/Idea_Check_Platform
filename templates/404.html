<!--
  404.html — Page Not Found Error
  Shown automatically when user visits a route that doesn't exist
  Registered in app.py via @app.errorhandler(404)
-->
{% extends "base.html" %}
{% block title %}404 — Page Not Found{% endblock %}

{% block content %}
<div class="container text-center" style="padding: 4rem 1rem;">

  <!-- Error icon -->
  <div style="font-size: 5rem; color: var(--accent); margin-bottom: 1rem;">
    <i class="fas fa-compass"></i>
  </div>

  <!-- Error code and message -->
  <h1 style="font-size: 4rem; color: var(--navy); margin-bottom: 0.5rem;">404</h1>
  <h2 style="margin-bottom: 1rem;">Page Not Found</h2>
  <p class="text-gray" style="max-width: 400px; margin: 0 auto 2rem;">
    The page you are looking for does not exist or has been moved.
  </p>

  <!-- Go back home button -->
  <a href="{{ url_for('student.index') }}" class="btn btn-primary">
    <i class="fas fa-home"></i> Go Back Home
  </a>

</div>
{% endblock %}
