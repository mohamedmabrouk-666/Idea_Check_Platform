<!--
  500.html — Internal Server Error
  Shown automatically when an unexpected error occurs in the app
  Registered in app.py via @app.errorhandler(500)
-->
{% extends "base.html" %}
{% block title %}500 — Server Error{% endblock %}

{% block content %}
<div class="container text-center" style="padding: 4rem 1rem;">

  <!-- Error icon -->
  <div style="font-size: 5rem; color: var(--danger); margin-bottom: 1rem;">
    <i class="fas fa-triangle-exclamation"></i>
  </div>

  <!-- Error code and message -->
  <h1 style="font-size: 4rem; color: var(--navy); margin-bottom: 0.5rem;">500</h1>
  <h2 style="margin-bottom: 1rem;">Something Went Wrong</h2>
  <p class="text-gray" style="max-width: 400px; margin: 0 auto 2rem;">
    An unexpected error occurred on the server. Please try again later
    or contact the system administrator.
  </p>

  <!-- Go back home button -->
  <a href="{{ url_for('student.index') }}" class="btn btn-primary">
    <i class="fas fa-home"></i> Go Back Home
  </a>

</div>
{% endblock %}
